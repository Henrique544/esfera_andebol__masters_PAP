<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Loja (Área de Sócio)</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .btn { padding:8px 14px; border-radius:8px; border:none; cursor:pointer; color:#fff; }
    .btn-primary{background:#007bff}
    .btn-dark{background:#111}
    .linkbtn{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer}
    .card { background:#f6f6f6; padding:12px; border-radius:10px; border:1px solid #eee; margin:12px 0; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    input,select { padding:8px; border-radius:8px; border:1px solid #ccc; width:260px; }
    .mini{font-size:12px;color:#666}
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#f1f3f5; border:1px solid #e9ecef; font-size:12px; }
    .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-top:12px;}
    .img{width:100%; height:160px; border-radius:10px; background:#ddd; object-fit:cover;}
    .ui-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9999}
    .ui-modal{width:min(520px,92vw);background:#fff;border-radius:16px;border:1px solid #eee;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
    .ui-head{padding:14px 16px;border-bottom:1px solid #eee;display:flex;gap:10px;align-items:center;justify-content:space-between}
    .ui-title{margin:0;font-size:16px}
    .ui-close{border:none;background:transparent;font-size:18px;cursor:pointer;line-height:1}
    .ui-body{padding:14px 16px;color:#222;white-space:pre-line}
    .ui-foot{padding:12px 16px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:flex-end}
    .ui-btn{border:none;border-radius:10px;padding:10px 14px;cursor:pointer}
    .ui-btn-primary{background:#111;color:#fff}
    .ui-btn-ghost{background:#f2f2f2}
    .ui-badge{font-size:12px;padding:4px 8px;border-radius:999px;background:#f1f3f5;border:1px solid #e9ecef}
  </style>
</head>
<body>
  <div class="top">
    <h1>Loja (Área de Sócio)</h1>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" id="goSocioBtn">Área de Sócio</button>
      <button class="linkbtn" onclick="window.location.href='loja.html'">Ver loja pública</button>
      <button class="linkbtn" onclick="window.location.href='pagina_principal.html'">Voltar ao início</button>
    </div>
  </div>

  <div class="card" id="userCard">A carregar...</div>

  <div class="card">
    <h2 style="margin:0 0 6px 0;">Comprar</h2>
    <p class="mini">Para comprar tens de confirmar <strong>password</strong> e <strong>código de segurança</strong>.</p>

    <form id="formComprar">
      <div class="row">
        <div>
          <label><strong>Produto:</strong></label><br>
          <select id="sku" required></select>
        </div>

        <div>
          <label><strong>Quantidade:</strong></label><br>
          <input type="number" id="qtd" min="1" max="10" value="1" required>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label><strong>Password:</strong></label><br>
          <input type="password" id="pass" required>
        </div>

        <div>
          <label><strong>Código de segurança:</strong></label><br>
          <input type="password" id="cod" required>
        </div>

        <button class="btn btn-dark" type="submit" id="btn">Comprar</button>
      </div>
    </form>
  </div>

  <h2 style="margin:14px 0 0 0;">Produtos</h2>
  <div class="grid" id="grid"></div>

  <!-- MODAL -->
  <div class="ui-backdrop" id="uiBackdrop">
    <div class="ui-modal">
      <div class="ui-head">
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="ui-badge" id="uiKind">INFO</span>
          <h3 class="ui-title" id="uiTitle">Aviso</h3>
        </div>
        <button class="ui-close" id="uiClose">✕</button>
      </div>
      <div class="ui-body" id="uiBody"></div>
      <div class="ui-foot" id="uiFoot"></div>
    </div>
  </div>

  <script>
    const ui = (() => {
      const bd = document.getElementById("uiBackdrop");
      const kind = document.getElementById("uiKind");
      const title = document.getElementById("uiTitle");
      const body = document.getElementById("uiBody");
      const foot = document.getElementById("uiFoot");
      const closeBtn = document.getElementById("uiClose");

      function open({k="INFO", t="Aviso", text="", buttons=[]}){
        kind.textContent = k;
        title.textContent = t;
        body.textContent = text;
        foot.innerHTML = "";
        buttons.forEach(b=>{
          const btn=document.createElement("button");
          btn.className="ui-btn " + (b.primary ? "ui-btn-primary" : "ui-btn-ghost");
          btn.textContent=b.text;
          btn.addEventListener("click", ()=>{ b.onClick?.(); });
          foot.appendChild(btn);
        });
        bd.style.display="flex";
      }
      function close(){ bd.style.display="none"; }
      closeBtn.addEventListener("click", close);
      bd.addEventListener("click", (e)=>{ if(e.target===bd) close(); });

      return {
        alert({title="Aviso", message="", kind="INFO"}){
          return new Promise(resolve=>{
            open({ k: kind, t: title, text: message, buttons:[{text:"OK", primary:true, onClick:()=>{ close(); resolve(true);} }]});
          });
        },
        confirm({title="Confirmar", message="", kind="CONFIRMAÇÃO"}){
          return new Promise(resolve=>{
            open({
              k: kind, t: title, text: message,
              buttons:[
                {text:"Cancelar", onClick:()=>{ close(); resolve(false);} },
                {text:"Confirmar", primary:true, onClick:()=>{ close(); resolve(true);} }
              ]
            });
          });
        }
      };
    })();

    const API = "http://localhost:3000";
    let currentUser = null;

    function getEmailLogin() {
      return localStorage.getItem("emailSocio") || new URLSearchParams(location.search).get("email");
    }

    function imageForSku(sku){
      const map = {
        "EQ-001": "jogo_principal.png",
        "EQ-002" : "jogo_alternativa.png",
        "EQ-003" : "jogo_calcoes.png",
        "GK-001" : "jogo_redes_frente.png",
        "GK-002" : "jogo_calcoes_redes.png",
        "SW-001": "sweat_preta.png",
        "SW-002": "sweat_laranja.png",
        "CM-001": "polo.png",
        "AC-001": "cascol.png",
      };
      return map[sku] || "";
    }

    async function carregarSessaoOuRedirect(){
      const email = getEmailLogin();
      if (!email) {
        await ui.alert({kind:"ERRO", title:"Sessão", message:"Tens de iniciar sessão para comprar na loja."});
        window.location.href = "login.html";
        return null;
      }
      const res = await fetch(`${API}/api/historico?email=${encodeURIComponent(email)}`);
      const data = await res.json();
      if (!res.ok) {
        await ui.alert({kind:"ERRO", title:"Sessão", message:data.error || "Sessão inválida. Faz login novamente."});
        window.location.href = "login.html";
        return null;
      }
      currentUser = data.user;
      localStorage.setItem("emailSocio", currentUser.email);
      document.getElementById("userCard").innerHTML = `
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <span class="pill"><strong>Nome:</strong> ${currentUser.nome ?? "-"}</span>
          <span class="pill"><strong>Email:</strong> ${currentUser.email}</span>
          <span class="pill"><strong>Tipo:</strong> ${currentUser.tipo}</span>
          <span class="pill"><strong>Código:</strong> ••••-${currentUser.codigoSegurancaHint}</span>
        </div>
      `;
      return email;
    }

    async function loadProdutos(){
      const res = await fetch(`${API}/api/loja/produtos`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Erro a carregar produtos.");
      return data.produtos || [];
    }

    document.getElementById("goSocioBtn").addEventListener("click", () => {
      const email = getEmailLogin();
      window.location.href = `areaSocio.html?email=${encodeURIComponent(email || "")}`;
    });

    (async () => {
      const email = await carregarSessaoOuRedirect();
      if (!email) return;

      const produtos = await loadProdutos();

      // preencher select
      const sel = document.getElementById("sku");
      sel.innerHTML = `<option value="">Selecionar</option>` + produtos.map(p =>
        `<option value="${p.sku}">${p.nome} - €${Number(p.preco).toFixed(2)}</option>`
      ).join("");

      // render cards
      const grid = document.getElementById("grid");
      grid.innerHTML = produtos.map(p => {
        const img = imageForSku(p.sku);
        return `
          <div class="card">
            ${img ? `<img class="img" src="${img}" alt="${p.nome}">` : `<div class="img"></div>`}
            <h3 style="margin:10px 0 4px 0;">${p.nome}</h3>
            <div class="mini">Categoria: ${p.categoria}</div>
            <div><strong>€${Number(p.preco).toFixed(2)}</strong></div>
            <div class="mini">SKU: ${p.sku}</div>
          </div>
        `;
      }).join("");

      // comprar
      document.getElementById("formComprar").addEventListener("submit", async (e) => {
        e.preventDefault();
        const sku = sel.value;
        const quantidade = Number(document.getElementById("qtd").value || 0);
        const password = document.getElementById("pass").value.trim();
        const codigoSeguranca = document.getElementById("cod").value.trim();

        if (!sku) return ui.alert({kind:"ERRO", title:"Loja", message:"Seleciona um produto."});
        if (!password) return ui.alert({kind:"ERRO", title:"Loja", message:"Insere a password."});
        if (!codigoSeguranca) return ui.alert({kind:"ERRO", title:"Loja", message:"Insere o código de segurança."});

        const ok = await ui.confirm({ title:"Confirmar compra", message:`Confirmar compra do produto ${sku} (x${quantidade})?` });
        if (!ok) return;

        const res = await fetch(`${API}/api/loja/comprar`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ email, sku, quantidade, password, codigoSeguranca })
        });
        const data = await res.json();
        if (!res.ok) return ui.alert({kind:"ERRO", title:"Loja", message:data.error || "Erro ao comprar."});

        await ui.alert({kind:"SUCESSO", title:"Compra registada", message:`Compra registada no histórico. Para confirmar a sua compra deve pagar presencialmente na secretaria\nTotal: €${Number(data.total ?? 0).toFixed(2)}`});
        window.location.href = `areaSocio.html?email=${encodeURIComponent(email)}`;
      });
    })();
  </script>
</body>
</html>
